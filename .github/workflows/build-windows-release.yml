          call "%conda_exe%" run -p "%root%\envs\env-base" pip uninstall torch torchvision -y 
          call "%conda_exe%" run -p "%root%\envs\env-base" pip install --timeout=120 torch==2.3.1+cu118 torchvision==0.18.1+cu118 --index-url https://download.pytorch.org/whl/cu118 
          call "%conda_exe%" run -p "%root%\envs\env-base" pip install --timeout=120 dill
          call "%conda_exe%" run -p "%root%\envs\env-base" pip install --timeout=120 pip-system-certs

          @REM create archive of entire base install
          mkdir "%USERPROFILE%\temp"
          "C:\Program Files\7-Zip\7z.exe" a -t7z -mx9 "%USERPROFILE%\temp\base-install.7z" "%USERPROFILE%\AddaxAI\*"

          @REM remove folder contents
          rmdir /s /q "%USERPROFILE%\AddaxAI"

      - name: Set env.USERPROFILE variable
        shell: cmd
        run: |
          echo USERPROFILE=%USERPROFILE%>> %GITHUB_ENV%
          echo USERPROFILE is "%USERPROFILE%"

      - name: Split and upload base-install to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $file = "${{ env.USERPROFILE }}\temp\base-install.7z"
          $size = (Get-Item $file).Length
          $partSize = 1900 * 1024 * 1024
          $reader = [System.IO.File]::OpenRead($file)
          $buffer = New-Object byte[] (8 * 1024 * 1024)
          $partNum = 1
          $parts = @()
          while ($reader.Position -lt $reader.Length) {
            $partName = "windows-base-install.7z.$('{0:D3}' -f $partNum)"
            $partPath = Join-Path "${{ env.USERPROFILE }}\temp" $partName
            $writer = [System.IO.File]::Create($partPath)
            $written = 0
            while ($written -lt $partSize -and $reader.Position -lt $reader.Length) {
              $toRead = [Math]::Min($buffer.Length, $partSize - $written)
              $read = $reader.Read($buffer, 0, $toRead)
              $writer.Write($buffer, 0, $read)
              $written += $read
            }
            $writer.Close()
            $parts += $partName
            $partNum++
          }
          $reader.Close()
          foreach ($part in $parts) {
            gh release upload "$env:UPLOAD_TAG" "${{ env.USERPROFILE }}\temp\$part" --clobber
          }
          $partsJson = ($parts | ForEach-Object { "`"$_`"" }) -join ", "
          echo "PARTS_BASE=[$partsJson]" >> $env:GITHUB_ENV
          echo "SIZE_BASE=$size" >> $env:GITHUB_ENV
          echo "NUM_BASE_PARTS=$($parts.Count)" >> $env:GITHUB_ENV

      - name: Generate and upload windows-manifest.json
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import json, os
          manifest = {}
          for name in ['pytorch', 'tensorflow-v1', 'tensorflow-v2', 'speciesnet']:
              key = f'windows-env-{name}.zip'
              parts = json.loads(os.environ[f'PARTS_{name.upper().replace(\"-\", \"_\")}'])
              size = int(os.environ[f'SIZE_{name.upper().replace(\"-\", \"_\")}'])
              manifest[key] = {'parts': parts, 'total_size': size}
          base_parts = json.loads(os.environ['PARTS_BASE'])
          manifest['windows-base-install.7z'] = {
              'parts': base_parts,
              'total_size': int(os.environ['SIZE_BASE'])
          }
          with open('windows-manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          "
          gh release upload "${{ env.UPLOAD_TAG }}" windows-manifest.json --clobber

